document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {

    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {

        e.target.tagName, String(e.target.src || e.target.href || ''));

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n:center;\">\n\n  <div data-reveal=\"1\" style=\"display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;animation:revealUp .7s cubic-bezier(.16,1,.3,1) both;\">\n    <span style=\"width:8px;height:8px;border-radius:50%;background:#F97316;animation:pulseDot 2s ease-in-out infinite;\"><\u002Fspan>\n    <span style=\"text-transform:uppercase;letter-spacing:.14em;font-size:13px;font-weight:600;color:#A855F7;\">{{brandName}} · Agencia de Soluciones con IA<\u002Fspan>\n  <\u002Fdiv>\n\n  <h1 data-reveal=\"1\" style=\"font-family:Sora,sans-serif;font-weight:800;font-size:clamp(29px,8vw,68px);line-height:1.16;letter-spacing:-0.02em;color:#fff;margin:0 auto 28px;animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;\">\n    Encontramos dónde tu negocio está <span style=\"background:linear-gradient(90deg,#A855F7,#D946EF,#F97316);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 5s ease infinite, glowTextPulse 3s ease-in-out infinite;\">perdiendo dinero<\u002Fspan> — y lo arreglamos con IA.\n  <\u002Fh1>\n\n  <p data-reveal=\"1\" style=\"font-size:clamp(17px,2vw,20px);line-height:1.7;color:#A1A1AA;max-width:680px;margin:0 auto 40px;animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;animation-delay:.1s;\">\n    No necesitas \"usar más IA\". Necesitas que alguien mire tu negocio de verdad, encuentre exactamente dónde se te escapan clientes y horas, y lo resuelva por ti. Tú sigues siendo el dueño — nosotros ponemos la tecnología a trabajar.\n  <\u002Fp>\n\n  <div data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;animation-delay:.2s;\">\n    <a href=\"{{waLink}}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#8B5CF6,#D946EF);color:#fff;padding:19px 36px;border-radius:14px;font-weight:600;font-size:17px;box-shadow:0 0 44px rgba(139,92,246,.4);transition:all .3s ease;\" style-hover=\"box-shadow:0 0 64px rgba(139,92,246,.6);transform:translateY(-2px);background:linear-gradient(135deg,#A855F7,#D946EF 50%,#F59E0B 100%);\">\n      💬 Cuéntame tu problema por WhatsApp →\n    <\u002Fa>\n    <p style=\"font-size:14px;color:#71717A;margin:16px 0 0;\">Respuesta en menos de 24 horas. Cero compromiso en la primera conversación.<\u002Fp>\n    <div style=\"display:inline-flex;align-items:center;gap:9px;margin-top:24px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.28);border-radius:999px;padding:9px 18px;\">\n      <span style=\"font-size:15px;\">📉<\u002Fspan>\n      <span style=\"font-size:13.5px;font-weight:500;color:#F59E0B;\">El negocio promedio pierde entre 20% y 40% de sus clientes al año — casi siempre por no dar seguimiento.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"hero-diagram\" data-reveal=\"1\" style=\"position:relative;z-index:1;width:100%;max-width:520px;aspect-ratio:1/1;margin:72px auto 0;animation:revealUp .9s cubic-bezier(.16,1,.3,1) both;animation-delay:.3s;\">\n    <div style=\"position:absolute;inset:8%;border-radius:50%;border:2px dashed rgba(139,92,246,.25);\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:8%;border-radius:50%;background:conic-gradient(from 0deg,rgba(217,70,239,.95) 0deg,transparent 36deg,transparent 360deg);filter:blur(7px);animation:spinConic 6s linear infinite;opacity:.85;\"><\u002Fdiv>\n\n    <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#6D28D9,#A855F7,#D946EF);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 40px rgba(139,92,246,.5);animation:pulseDot 2.4s ease-in-out infinite;z-index:2;\">💰<\u002Fdiv>\n\n    <div class=\"hero-badge hb-top\" style=\"position:absolute;left:50%;top:9%;transform:translate(-50%,-50%);width:clamp(82px,23vw,126px);background:rgba(17,17,24,.9);backdrop-filter:blur(14px);border:1px solid rgba(139,92,246,.3);border-radius:16px;padding:14px 8px;text-align:center;box-shadow:0 10px 24px rgba(0,0,0,.35);animation:floatY 5s ease-in-out infinite;z-index:2;\">\n      <div style=\"font-size:23px;line-height:1;margin-bottom:6px;\">🎯<\u002Fdiv>\n      <div style=\"font-size:12px;font-weight:700;color:#fff;\">Adquisición<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-badge hb-right\" style=\"position:absolute;left:87%;top:37%;transform:translate(-50%,-50%);width:clamp(82px,23vw,126px);background:rgba(17,17,24,.9);backdrop-filter:blur(14px);border:1px solid rgba(139,92,246,.3);border-radius:16px;padding:14px 8px;text-align:center;box-shadow:0 10px 24px rgba(0,0,0,.35);animation:floatY2 5.5s ease-in-out infinite;z-index:2;\">\n      <div style=\"font-size:23px;line-height:1;margin-bottom:6px;\">💬<\u002Fdiv>\n      <div style=\"font-size:12px;font-weight:700;color:#fff;\">Ventas<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-badge hb-br\" style=\"position:absolute;left:72%;top:81%;transform:translate(-50%,-50%);width:clamp(82px,23vw,126px);background:rgba(17,17,24,.9);backdrop-filter:blur(14px);border:1px solid rgba(139,92,246,.3);border-radius:16px;padding:14px 8px;text-align:center;box-shadow:0 10px 24px rgba(0,0,0,.35);animation:floatY 6s ease-in-out infinite;z-index:2;\">\n      <div style=\"font-size:23px;line-height:1;margin-bottom:6px;\">🤝<\u002Fdiv>\n      <div style=\"font-size:12px;font-weight:700;color:#fff;\">Cierre<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-badge hb-bl\" style=\"position:absolute;left:28%;top:81%;transform:translate(-50%,-50%);width:clamp(82px,23vw,126px);background:rgba(17,17,24,.9);backdrop-filter:blur(14px);border:1px solid rgba(139,92,246,.3);border-radius:16px;padding:14px 8px;text-align:center;box-shadow:0 10px 24px rgba(0,0,0,.35);animation:floatY2 6.5s ease-in-out infinite;z-index:2;\">\n      <div style=\"font-size:23px;line-height:1;margin-bottom:6px;\">📦<\u002Fdiv>\n      <div style=\"font-size:12px;font-weight:700;color:#fff;\">Entrega<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-badge hb-left\" style=\"position:absolute;left:13%;top:37%;transform:translate(-50%,-50%);width:clamp(82px,23vw,126px);background:rgba(17,17,24,.92);backdrop-filter:blur(14px);border:1.5px solid rgba(249,115,22,.65);border-radius:16px;padding:14px 8px;text-align:center;animation:floatY 5.2s ease-in-out infinite,pulseGlowOrange 2.2s ease-in-out infinite;z-index:3;\">\n      <span style=\"position:absolute;top:-9px;right:-9px;background:#F97316;color:#fff;font-size:10px;font-weight:800;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(249,115,22,.7);animation:pulseDot 1.6s ease-in-out infinite;\">!<\u002Fspan>\n      <div style=\"font-size:23px;line-height:1;margin-bottom:6px;\">🔁<\u002Fdiv>\n      <div style=\"font-size:12px;font-weight:700;color:#F97316;\">Fidelización<\u002Fdiv>\n      <div style=\"font-size:9px;font-weight:700;color:#F97316;letter-spacing:.03em;margin-top:2px;text-transform:uppercase;\">Cuello de botella<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p data-reveal=\"1\" style=\"text-align:center;font-size:14px;color:#71717A;max-width:480px;margin:28px auto 0;animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;animation-delay:.4s;\">Cada etapa de tu negocio puede sangrar dinero. <strong style=\"color:#A1A1AA;font-weight:600;\">Ejemplo:<\u002Fstrong> un restaurante que nunca vuelve a contactar a sus clientes pierde ventas cada mes sin notarlo. El Diagnóstico de Fuga encuentra exactamente en cuál etapa te pasa a ti.<\u002Fp>\n<\u002Fsection>\n\n<div style=\"height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.3),transparent);max-width:1180px;margin:0 auto;\"><\u002Fdiv>\n\n<section style=\"position:relative;z-index:1;padding:clamp(64px,10vw,110px) clamp(20px,5vw,48px);max-width:900px;margin:0 auto;\">\n  <h2 data-reveal=\"1\" style=\"font-family:Sora,sans-serif;font-weight:700;font-size:clamp(28px,4.4vw,44px);line-height:1.2;letter-spacing:-0.02em;color:#fff;margin:0 0 32px;animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;\">\n    La IA no es tu problema. Es que nadie te ha dicho para <span style=\"background:linear-gradient(90deg,#A855F7,#D946EF);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease infinite, glowTextPulse 3s ease-in-out infinite;\">QUÉ<\u002Fspan> problema tuyo sirve.\n  <\u002Fh2>\n  <div data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;animation-delay:.1s;display:flex;flex-direction:column;gap:22px;font-size:18px;line-height:1.75;color:#A1A1AA;\">\n    <p style=\"margin:0;\">Todos los días ves un video de \"10 herramientas de IA que debes usar en tu negocio\". Las abres. Te registras. A la semana ya no las abriste más.<\u002Fp>\n    <p style=\"margin:0;\">No es que la tecnología no funcione. Es que nadie se sentó contigo a mirar tu negocio de verdad — cuánto pierdes por clientes que no vuelven, cuántas horas se van en tareas que un sistema podría hacer solo, cuánta plata dejas sobre la mesa porque no tienes tiempo de perseguirla.<\u002Fp>\n    <p style=\"margin:0;\">Las agencias grandes te venden paquetes genéricos. Los freelancers te instalan un chatbot y desaparecen. Tú te quedas igual: ocupado, cansado, y con la sensación de que la tecnología es para \"otros negocios\", no para el tuyo.<\u002Fp>\n    <p style=\"margin:0;color:#fff;font-weight:600;\">No es así. El problema nunca fue la IA. Fue que nadie diseñó la solución alrededor de TU negocio.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"position:relative;z-index:1;padding:clamp(64px,10vw,110px) clamp(20px,5vw,48px);max-width:1180px;margin:0 auto;\">\n  <div data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;background:linear-gradient(145deg,rgba(139,92,246,.08),rgba(217,70,239,.05));border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:clamp(32px,6vw,64px);\">\n    <span style=\"text-transform:uppercase;letter-spacing:.14em;font-size:13px;font-weight:600;color:#F97316;\">Por qué existe {{brandName}}<\u002Fspan>\n    <h2 style=\"font-family:Sora,sans-serif;font-weight:700;font-size:clamp(26px,3.6vw,38px);line-height:1.25;letter-spacing:-0.02em;color:#fff;margin:18px 0 28px;max-width:760px;\">\n      Growmas no nació en una oficina de consultoría. Nació de una pregunta simple.\n    <\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:20px;font-size:17px;line-height:1.75;color:#A1A1AA;max-width:820px;\">\n      <p style=\"margin:0;\">¿Por qué la tecnología más poderosa de la década sigue siendo invisible para el dueño de negocio del día a día?<\u002Fp>\n      <p style=\"margin:0;\">No creemos en instalar herramientas de moda. Creemos en algo más simple y más difícil: sentarnos contigo, entender exactamente dónde se te está yendo el dinero o el tiempo, y construir ahí — no donde está de moda construir.<\u002Fp>\n      <p style=\"margin:0;\">Cada negocio pierde plata de forma distinta. Un restaurante la pierde en clientes que no vuelven. Una clínica la pierde en citas perdidas. Un negocio online la pierde en mensajes que nadie responde a tiempo. Nuestro trabajo es encontrar exactamente dónde sangra el tuyo — y diseñar la solución con IA para esa herida específica, no una genérica.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"metodo\" style=\"position:relative;z-index:1;padding:clamp(64px,10vw,110px) clamp(20px,5vw,48px);max-width:1180px;margin:0 auto;\">\n  <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:40px;margin:0 0 52px;\">\n  <div data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;flex:1 1 420px;min-width:280px;\">\n    <span style=\"text-transform:uppercase;letter-spacing:.14em;font-size:13px;font-weight:600;color:#06B6D4;\">El Método {{brandName}}<\u002Fspan>\n    <h2 style=\"font-family:Sora,sans-serif;font-weight:700;font-size:clamp(28px,4.2vw,44px);line-height:1.2;letter-spacing:-0.02em;color:#fff;margin:16px 0 0;\">\n      Encontramos el problema antes de tocar una sola línea de código\n    <\u002Fh2>\n    <p style=\"font-size:17px;line-height:1.7;color:#A1A1AA;margin:20px 0 0;\">La mayoría de agencias empieza preguntando \"¿qué quieres automatizar?\". Nosotros empezamos preguntando \"¿dónde estás perdiendo dinero sin darte cuenta?\"<\u002Fp>\n  <\u002Fdiv>\n  <div data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;flex:0 1 240px;min-width:200px;display:flex;justify-content:center;\">\n    <div style=\"width:200px;background:linear-gradient(160deg,rgba(139,92,246,.15),rgba(6,182,212,.08));border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.4);animation:float3d 6s ease-in-out infinite;\">\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#06B6D4;flex:none;box-shadow:0 0 10px rgba(6,182,212,.8);\"><\u002Fspan><span style=\"height:2px;flex:1;background:linear-gradient(90deg,#06B6D4,transparent);\"><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#8B5CF6;flex:none;box-shadow:0 0 10px rgba(139,92,246,.8);\"><\u002Fspan><span style=\"height:2px;flex:1;background:linear-gradient(90deg,#8B5CF6,transparent);\"><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#D946EF;flex:none;box-shadow:0 0 10px rgba(217,70,239,.8);\"><\u002Fspan><span style=\"height:2px;flex:1;background:linear-gradient(90deg,#D946EF,transparent);\"><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#F59E0B;flex:none;box-shadow:0 0 10px rgba(245,158,11,.8);\"><\u002Fspan><span style=\"height:2px;flex:1;background:linear-gradient(90deg,#F59E0B,transparent);\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:16px 0 0;font-size:11px;color:#A1A1AA;text-align:center;\">Del diagnóstico a la entrega<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px;\">\n    <sc-for list=\"{{steps}}\" as=\"step\" hint-placeholder-count=\"4\">\n      <div data-reveal=\"1\" style=\"animation:revealUp .6s cubic-bezier(.16,1,.3,1) both;background:#111118;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:32px;transition:all .3s ease;\" style-hover=\"border-color:rgba(139,92,246,.3);box-shadow:0 0 40px rgba(139,92,246,.1);transform:translateY(-4px);\">\n        <span style=\"font-family:Sora,sans-serif;font-weight:800;font-size:34px;background:linear-gradient(90deg,#A855F7,#D946EF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\">{{step.n}}<\u002Fspan>\n        <h3 style=\"font-family:Sora,sans-serif;font-weight:700;font-size:19px;color:#fff;margin:16px 0 10px;\">{{step.title}}<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.65;color:#A1A1AA;margin:0;\">{{step.desc}}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;margin-top:56px;background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(217,70,239,.08));border:1px solid rgba(139,92,246,.25);border-radius:20px;padding:clamp(28px,5vw,44px);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:24px;\">\n    <p style=\"font-family:Sora,sans-serif;font-weight:700;font-size:clamp(19px,2.4vw,24px);color:#fff;margin:0;max-width:520px;\">¿Ya sabes dónde te está sangrando tu negocio? Hablemos.<\u002Fp>\n    <a href=\"{{waLink}}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#8B5CF6,#D946EF);color:#fff;padding:16px 30px;border-radius:12px;font-weight:600;font-size:16px;box-shadow:0 0 32px rgba(139,92,246,.35);transition:all .3s ease;\" style-hover=\"box-shadow:0 0 48px rgba(139,92,246,.55);transform:translateY(-2px);\">💬 Descubre dónde estás perdiendo dinero →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"resolvemos\" style=\"position:relative;z-index:1;padding:clamp(64px,10vw,110px) clamp(20px,5vw,48px);max-width:1180px;margin:0 auto;\">\n  <h2 data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;font-family:Sora,sans-serif;font-weight:700;font-size:clamp(28px,4.2vw,44px);line-height:1.2;letter-spacing:-0.02em;color:#fff;max-width:760px;margin:0 0 48px;\">\n    Estos son los tipos de fuga que más vemos en negocios como el tuyo\n  <\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;\">\n    <sc-for list=\"{{leaks}}\" as=\"leak\" hint-placeholder-count=\"4\">\n      <div data-reveal=\"1\" style=\"animation:revealUp .6s cubic-bezier(.16,1,.3,1) both;background:#111118;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:32px;transition:all .3s ease;\" style-hover=\"border-color:rgba(139,92,246,.3);box-shadow:0 0 40px rgba(139,92,246,.1);transform:translateY(-4px);\">\n        <span style=\"font-size:30px;line-height:1;\">{{leak.icon}}<\u002Fspan>\n        <h3 style=\"font-family:Sora,sans-serif;font-weight:700;font-size:18px;color:#fff;margin:18px 0 10px;line-height:1.35;\">{{leak.title}}<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.65;color:#A1A1AA;margin:0;\">{{leak.desc}}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <p data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;margin-top:36px;font-size:16px;color:#71717A;font-style:italic;\">¿Tu problema no está en la lista? Mejor — probablemente signifique que nadie más lo está resolviendo todavía.<\u002Fp>\n<\u002Fsection>\n\n<section id=\"oferta\" style=\"position:relative;z-index:1;padding:clamp(64px,10vw,110px) clamp(20px,5vw,48px);max-width:1000px;margin:0 auto;\">\n  <h2 data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;font-family:Sora,sans-serif;font-weight:700;font-size:clamp(28px,4.4vw,44px);line-height:1.2;letter-spacing:-0.02em;color:#fff;margin:0 0 44px;\">\n    No te vendemos un proyecto de meses. Te vendemos un diagnóstico que en 20 minutos te dice si vale la pena — <span style=\"background:linear-gradient(90deg,#A855F7,#D946EF,#F97316);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease infinite, glowTextPulse 3s ease-in-out infinite;\">gratis<\u002Fspan>.\n  <\u002Fh2>\n  <p data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;font-size:17px;line-height:1.7;color:#A1A1AA;margin:0 0 40px;max-width:720px;\">Lo hacemos gratis por una razón simple: la mayoría de las veces, la fuga que encontramos paga sola el proyecto. Preferimos mostrártelo antes de cobrarte nada.<\u002Fp>\n\n  <div style=\"display:flex;flex-direction:column;gap:16px;margin-bottom:40px;\">\n    <sc-for list=\"{{valueStack}}\" as=\"item\" hint-placeholder-count=\"4\">\n      <div data-reveal=\"1\" style=\"animation:revealUp .5s cubic-bezier(.16,1,.3,1) both;display:flex;gap:16px;align-items:flex-start;background:#111118;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:22px 26px;\">\n        <span style=\"font-size:20px;flex:none;\">✅<\u002Fspan>\n        <div>\n          <p style=\"margin:0;font-weight:700;color:#fff;font-size:16px;\">{{item.title}}<\u002Fp>\n          <p style=\"margin:6px 0 0;color:#A1A1AA;font-size:15px;line-height:1.6;\">{{item.desc}}<\u002Fp>\n          <sc-if value=\"{{item.tag}}\" hint-placeholder-val=\"{{true}}\">\n            <span style=\"display:inline-block;margin-top:8px;font-size:12px;font-weight:600;color:#F59E0B;letter-spacing:.04em;\">{{item.tag}}<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;background:linear-gradient(135deg,#6D28D9,#A855F7,#D946EF);border-radius:20px;padding:2px;margin-bottom:28px;\">\n    <div style=\"background:#0A0A0F;border-radius:18px;padding:clamp(26px,5vw,38px);\">\n      <h3 style=\"font-family:Sora,sans-serif;font-weight:700;font-size:22px;color:#fff;margin:0 0 12px;\">Garantía \"Vale la pena o no seguimos.\"<\u002Fh3>\n      <p style=\"margin:0;font-size:16px;line-height:1.7;color:#A1A1AA;\">Si en el diagnóstico no encontramos una fuga que valga la pena resolver, te lo decimos directamente — no te vamos a inventar un problema para venderte algo. Preferimos tu confianza a corto plazo que tu plata a un solo proyecto.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;display:flex;align-items:center;gap:10px;margin-bottom:36px;\">\n    <span style=\"width:8px;height:8px;border-radius:50%;background:#F97316;animation:pulseDot 2s ease-in-out infinite;flex:none;\"><\u002Fspan>\n    <p style=\"margin:0;font-size:15px;color:#71717A;\">Estamos tomando un número limitado de diagnósticos por semana porque cada uno lo hacemos personalmente — no hay bots ni encuestas automáticas del otro lado. Cuando se llenan los cupos de la semana, pasas a la siguiente.<\u002Fp>\n  <\u002Fdiv>\n\n  <div data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;text-align:center;\">\n    <a href=\"{{waLink}}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#8B5CF6,#D946EF);color:#fff;padding:19px 38px;border-radius:14px;font-weight:600;font-size:17px;box-shadow:0 0 44px rgba(139,92,246,.4);transition:all .3s ease;\" style-hover=\"box-shadow:0 0 64px rgba(139,92,246,.6);transform:translateY(-2px);\">💬 Quiero mi Diagnóstico de Fuga gratis →<\u002Fa>\n    <p style=\"font-size:14px;color:#71717A;margin:16px 0 0;\">Te respondemos nosotros, por WhatsApp. Cuéntanos en 2 líneas a qué se dedica tu negocio y qué es lo que más te frustra hoy.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"faq\" style=\"position:relative;z-index:1;padding:clamp(64px,10vw,110px) clamp(20px,5vw,48px);max-width:820px;margin:0 auto;\">\n  <h2 data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;font-family:Sora,sans-serif;font-weight:700;font-size:clamp(26px,3.8vw,38px);letter-spacing:-0.02em;color:#fff;margin:0 0 40px;\">Preguntas que probablemente tengas<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:14px;\">\n    <sc-for list=\"{{faqs}}\" as=\"item\" hint-placeholder-count=\"4\">\n      <div data-reveal=\"1\" style=\"animation:revealUp .5s cubic-bezier(.16,1,.3,1) both;background:#111118;border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden;\">\n        <div sc-camel-on-click=\"{{item.onToggle}}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 26px;cursor:pointer;\">\n          <p style=\"margin:0;font-weight:700;color:#fff;font-size:16px;\">{{item.q}}<\u002Fp>\n          <span style=\"flex:none;font-size:22px;color:#A855F7;font-weight:300;transform:rotate({{item.rotateDeg}}deg);transition:transform .3s ease;\">+<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"max-height:{{item.maxHeightPx}}px;opacity:{{item.opacityVal}};overflow:hidden;transition:max-height .35s ease,opacity .35s ease;padding:0 26px;\">\n          <p style=\"margin:0 0 22px;color:#A1A1AA;font-size:15px;line-height:1.7;\">{{item.a}}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"position:relative;z-index:1;padding:clamp(72px,12vw,130px) clamp(20px,5vw,48px);text-align:center;\">\n  <div style=\"position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:400px;background:linear-gradient(135deg,#6D28D9,#A855F7,#D946EF);filter:blur(120px);opacity:.28;z-index:-1;animation:blobMorph 14s ease-in-out infinite;\"><\u002Fdiv>\n  <h2 data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;font-family:Sora,sans-serif;font-weight:800;font-size:clamp(28px,4.6vw,48px);line-height:1.2;letter-spacing:-0.02em;color:#fff;max-width:760px;margin:0 auto 24px;\">\n    La fuga en tu negocio ya está pasando. La única pregunta es si la vas a seguir ignorando.\n  <\u002Fh2>\n  <p data-reveal=\"1\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;animation-delay:.1s;font-size:18px;color:#A1A1AA;max-width:560px;margin:0 auto 40px;\">Cada semana que pasa sin resolverla, es plata o tiempo que no vuelve. El diagnóstico toma 20 minutos y no cuesta nada. Lo único que arriesgas es seguir igual.<\u002Fp>\n  <a data-reveal=\"1\" href=\"{{waLink}}\" target=\"_blank\" rel=\"noopener\" style=\"animation:revealUp .8s cubic-bezier(.16,1,.3,1) both;animation-delay:.2s;display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#8B5CF6,#D946EF);color:#fff;padding:19px 38px;border-radius:14px;font-weight:600;font-size:17px;box-shadow:0 0 44px rgba(139,92,246,.4);\" style-hover=\"box-shadow:0 0 64px rgba(139,92,246,.6);transform:translateY(-2px);\">💬 Reserva tu cupo de esta semana →<\u002Fa>\n<\u002Fsection>\n\n<footer style=\"position:relative;z-index:1;border-top:1px solid rgba(255,255,255,.06);padding:44px clamp(20px,5vw,48px);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:20px;max-width:1180px;margin:0 auto;\">\n  <div style=\"display:flex;align-items:center;gap:11px;\">\n    <div style=\"width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#8B5CF6,#D946EF,#F97316);display:flex;align-items:center;justify-content:center;flex:none;\">\n      <span style=\"color:#fff;font-family:Sora,sans-serif;font-weight:800;font-size:16px;\">+<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-family:Sora,sans-serif;font-weight:700;font-size:15px;color:#71717A;\">{{brandName}} — Soluciones de IA diseñadas para tu negocio, no para la moda del momento.<\u002Fspan>\n  <\u002Fdiv>\n  <a href=\"{{waLink}}\" target=\"_blank\" rel=\"noopener\" style=\"font-size:14px;font-weight:600;color:#A855F7;\">Escríbenos por WhatsApp →<\u002Fa>\n<\u002Ffooter>\n\n<a href=\"{{waLink}}\" target=\"_blank\" rel=\"noopener\" aria-label=\"WhatsApp\" style=\"position:fixed;bottom:24px;right:24px;z-index:60;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#D946EF);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 32px rgba(139,92,246,.55);transition:all .3s ease;\" style-hover=\"box-shadow:0 0 48px rgba(139,92,246,.75);transform:scale(1.08);\">💬<\u002Fa>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;brandName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;GROWMAS&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Marca&quot;},&quot;whatsappNumber&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;51 932095432&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;WhatsApp&quot;},&quot;whatsappMessage&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Hola, vi la página de Growmas y quiero mi Diagnóstico de Fuga gratis. Mi negocio es: ___&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;WhatsApp&quot;}}\">\nclass Component extends DCLogic {\n  state = { scrolled: false, faqOpen: 0 };\n\n  componentDidMount() {\n    this._onScroll = () => {\n      const s = window.scrollY > 40;\n      if (s !== this.state.scrolled) this.setState({ scrolled: s });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n  }\n\n  toggleFaq = (i) => this.setState((s) => ({ faqOpen: s.faqOpen === i ? -1 : i }));\n\n  renderVals() {\n    const digits = (this.props.whatsappNumber || '51 932095432').replace(/[^0-9]/g, '');\n    const message = this.props.whatsappMessage || 'Hola, vi la página de Growmas y quiero mi Diagnóstico de Fuga gratis. Mi negocio es: ___';\n    const waLink = 'https://wa.me/' + digits + '?text=' + encodeURIComponent(message);\n    const brandName = this.props.brandName || 'GROWMAS';\n\n    const steps = [\n      { n: '01', title: 'Diagnóstico de Fuga', desc: 'Revisamos contigo tu operación real: clientes, procesos, tiempo, dinero. No hablamos de tecnología todavía. Hablamos de tu negocio.' },\n      { n: '02', title: 'Diseño a la Medida', desc: 'Con el diagnóstico en mano, diseñamos la solución exacta. Nunca partimos de \"esta es la herramienta, veamos dónde la metemos\".' },\n      { n: '03', title: 'Instalación y Entrega', desc: 'Lo construimos, lo probamos contigo, y te lo entregamos funcionando — sin que tengas que aprender a programar ni administrar nada técnico.' },\n      { n: '04', title: 'Medición Real', desc: 'Todo lo que instalamos se mide en una sola moneda: plata recuperada o tiempo ahorrado. Si no se puede medir, no lo vendemos.' },\n    ];\n\n    const leaks = [\n      { icon: '🔁', title: 'Clientes que compran una vez y no vuelven', desc: 'Sistemas de recuperación automática que traen de vuelta a tus clientes dormidos, sin que tengas que perseguirlos uno por uno.' },\n      { icon: '💬', title: 'Mensajes y consultas que se responden tarde (o nunca)', desc: 'Agentes que atienden, cotizan y agendan por ti las 24 horas — en WhatsApp, donde tus clientes ya están.' },\n      { icon: '📋', title: 'Tareas repetitivas que te comen el día', desc: 'Automatizaciones que conectan tus herramientas actuales para que dejes de copiar y pegar información entre sistemas.' },\n      { icon: '📈', title: 'Contenido y presencia que no tienes tiempo de sostener', desc: 'Agentes que generan contenido de valor consistente para que tu negocio no desaparezca del radar de tus clientes.' },\n    ];\n\n    const valueStackRaw = [\n      { title: 'Diagnóstico de Fuga (20-30 min, por videollamada)', desc: 'Identificamos juntos dónde estás perdiendo plata o tiempo hoy.', tag: 'Valor: S/ 150 — hoy, gratis' },\n      { title: 'Cálculo real de impacto', desc: 'Te mostramos, con tus propios números, cuánto podrías recuperar al mes si se resuelve esa fuga.', tag: '' },\n      { title: 'Plan de solución a la medida', desc: 'Sales de la llamada con una propuesta concreta, no una lista de servicios genéricos.', tag: '' },\n      { title: 'Sin compromiso de compra', desc: 'Si decides que no es el momento, te quedas con el diagnóstico igual. No hay letra chica.', tag: '' },\n    ];\n\n    const faqsRaw = [\n      { q: '¿Y si mi negocio es muy chico para esto?', a: 'Es justo al revés: mientras más chico eres, menos margen tienes para perder plata sin darte cuenta. El diagnóstico es gratis precisamente para que lo descubras sin arriesgar nada.' },\n      { q: 'No entiendo nada de tecnología, ¿voy a tener que aprender a usar algo complicado?', a: 'No. Tú sigues operando tu negocio como siempre. Nosotros nos encargamos de que la tecnología trabaje detrás, sin que tengas que tocarla.' },\n      { q: '¿Cuánto cuesta esto después del diagnóstico?', a: 'Depende de la solución — por eso no vendemos precios genéricos. En el diagnóstico te decimos el número exacto, sin sorpresas ni letra chica.' },\n      { q: 'Ya probé IA antes y no funcionó', a: 'Probablemente porque instalaste una herramienta sin que nadie diseñara el problema primero. Es la diferencia entre comprar un martillo y contratar a alguien que sabe qué clavo necesitas y dónde.' },\n    ];\n\n    const faqs = faqsRaw.map((f, i) => {\n      const isOpen = i === this.state.faqOpen;\n      return Object.assign({}, f, {\n        isOpen,\n        maxHeightPx: isOpen ? 400 : 0,\n        opacityVal: isOpen ? 1 : 0,\n        rotateDeg: isOpen ? 45 : 0,\n        onToggle: () => this.toggleFaq(i),\n      });\n    });\n\n    return {\n      waLink,\n      brandName,\n      navBgOpacity: this.state.scrolled ? 0.85 : 0,\n      navBorderOpacity: this.state.scrolled ? 0.08 : 0,\n      steps,\n      leaks,\n      valueStack: valueStackRaw,\n      faqs,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
